server.port=${QUICKQ_SERVER_PORT:8000}
spring.application.name=quickq-backend-java

spring.datasource.url=${QUICKQ_DATASOURCE_URL:jdbc:sqlite:quickq.db}
spring.datasource.driver-class-name=${QUICKQ_DATASOURCE_DRIVER:org.sqlite.JDBC}

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.data.redis.host=${QUICKQ_REDIS_HOST:localhost}
spring.data.redis.port=${QUICKQ_REDIS_PORT:6379}

spring.jackson.property-naming-strategy=SNAKE_CASE

app.security.jwt.secret=${QUICKQ_JWT_SECRET:QuickQ_Super_Secret_Key_For_Development_Only_change_me}
app.security.jwt.expiration-minutes=${QUICKQ_JWT_EXPIRATION_MINUTES:60}
app.cors.allowed-origin-patterns=${QUICKQ_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
app.bootstrap-admin.enabled=${QUICKQ_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap-admin.username=${QUICKQ_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.password=${QUICKQ_BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.admin.signup.enabled=${QUICKQ_ADMIN_SIGNUP_ENABLED:true}
app.admin.signup.invite-code=${QUICKQ_ADMIN_SIGNUP_INVITE_CODE:}
