version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - QUICKQ_REDIS_HOST=redis
      - QUICKQ_REDIS_PORT=6379
      - QUICKQ_SQLITE_PATH=./data/quickq.db
      - QUICKQ_TIMEZONE=Asia/Kolkata
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client-frontend:/usr/share/nginx/html/client:ro
      - ./admin-frontend:/usr/share/nginx/html/admin:ro
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
